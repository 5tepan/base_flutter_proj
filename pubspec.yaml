name: base_flutter_proj
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  http: ^1.6.0
  event_bus: ^2.0.1
  intl_utils: ^2.8.13
  connectivity_plus: ^7.0.0
  json_annotation: ^4.9.0
  permission_handler: ^12.0.1
  intl: ^0.20.2
  go_router: ^16.2.0
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1

  # Logs
  talker: ^5.1.13
  talker_flutter: ^5.1.13
  curl_converter: ^1.0.4

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_crashlytics: ^5.0.7

  # UI
  webview_flutter: ^4.13.1
  image_picker: ^1.2.1
  page_view_indicators: ^2.0.0
  extended_image: ^10.0.1
  flutter_auto_size_text: ^4.1.0
  flutter_slidable: ^4.0.3
  flutter_staggered_animations: ^1.1.1
  video_player: ^2.10.1
  modal_bottom_sheet: ^3.0.0
  bot_toast: ^4.1.3
  flutter_native_splash: ^2.4.7
  flutter_blurhash: ^0.9.1
  flutter_svg: ^2.2.3

  # Utils
  path: ^1.9.1
  http_interceptor: ^2.0.0
  collection: ^1.19.1
  scroll_to_index: ^3.0.1
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  uuid: ^4.5.2
  share_plus: ^12.0.1
  app_settings: ^7.0.0
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  downloadsfolder: ^1.2.0
  audioplayers: ^6.5.1
  crypto: ^3.0.7
  local_auth: ^2.3.0
  device_info_plus: ^12.3.0
  flutter_pdfview: ^1.4.4
  file_picker: ^10.3.10
  open_filex: ^4.7.0
  mime: ^2.0.0
  flutter_contacts: ^1.1.9+2
  gap: ^3.0.1
  clear_all_notifications: ^1.0.0
  smart_auth: ^3.2.0
  croppy: ^1.4.1
  dart_pusher_channels: ^1.2.3
  bottom_picker: ^4.1.1
  livekit_client: ^2.6.0
  dart_jsonwebtoken: ^3.3.1
  dropdown_button2: ^3.0.0-beta.23
  flutter_background: ^1.3.0+1
  flutter_webrtc: ^1.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.6.0
  json_serializable: ^6.9.5
  lints: ^5.1.1
  go_router_builder: ^4.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Thin.ttf
          weight: 100
        - asset: fonts/Roboto-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-LightItalic.ttf
          weight: 300
          style: italic
        - asset: fonts/Roboto-Regular.ttf
          weight: 400
        - asset: fonts/Roboto-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: fonts/Roboto-Black.ttf
          weight: 900
        - asset: fonts/Roboto-BlackItalic.ttf
          weight: 900
          style: italic

flutter_native_splash:
  image: assets/splash.png
  color: "#ffffff"
  android_12:
    image: assets/splash.png
    color: "#ffffff"
